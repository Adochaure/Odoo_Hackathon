<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Reimbursement System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="auth-container">

    <div class="card auth-card">

        <div class="card-body text-center">

            <div style="font-size: 3rem; margin-bottom: var(--spacing-lg);">🔐</div>

            <h2 class="card-title">Welcome Back</h2>
            <p class="card-subtitle">Sign in to your account to continue</p>

        </div>

        <form method="POST" class="auth-form">

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg">
                Sign In
            </button>

        </form>

        <div class="auth-divider">
            <span class="auth-divider-text">New here?</span>
        </div>

        <a href="/signup" class="btn btn-secondary btn-block">
            Create an Account
        </a>

    </div>

</div>

</body>
</html>

</body>
</html>
