<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">💼 Reimbursement System</span>

    <div>
        <span class="text-white me-3">Role: {{ role }}</span>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">

    <h3 class="text-center mb-4">📊 Dashboard</h3>

    <!-- 🔥 STATS -->
    <div class="row text-center mb-4">

        <div class="col-md-3">
            <div class="card bg-primary text-white p-3">
                <h5>Total</h5>
                <h3>{{ total }}</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-success text-white p-3">
                <h5>Approved</h5>
                <h3>{{ approved }}</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-warning text-dark p-3">
                <h5>Pending</h5>
                <h3>{{ pending }}</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-danger text-white p-3">
                <h5>Rejected</h5>
                <h3>{{ rejected }}</h3>
            </div>
        </div>

    </div>

    <!-- 🔥 CHART -->
    <div class="card p-4 mb-4">
        <canvas id="chart"></canvas>
    </div>

    <!-- 🔥 ACTIONS -->
    <div class="card p-4">

        <div class="d-grid gap-3">

            <a href="/submit" class="btn btn-primary">💸 Submit Expense</a>

            <a href="/my_expenses" class="btn btn-info text-white">📄 View Expenses</a>

            {% if role == "manager" %}
                <a href="/approve" class="btn btn-warning">✅ Approve</a>
            {% endif %}

        </div>

    </div>

</div>

<!-- 🔥 CHART SCRIPT -->
<script>
    const ctx = document.getElementById('chart');

    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['Approved', 'Pending', 'Rejected'],
            datasets: [{
                data: [{{ approved }}, {{ pending }}, {{ rejected }}]
            }]
        }
    });
</script>

</body>
</html>
