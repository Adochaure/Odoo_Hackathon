<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Expense - Reimbursement System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="page-wrapper">

<div class="page-content">
    <div class="container" style="max-width: 600px;">

        <!-- PAGE HEADER -->
        <div style="text-align: center; margin-bottom: var(--spacing-xl);">
            <h1 class="page-title">💸 Submit Expense</h1>
            <p class="page-subtitle">Add your expense details for approval workflow</p>
        </div>

        <!-- FORM CARD -->
        <div class="card">

            <form method="POST">

                <div class="form-group">
                    <label class="form-label">Amount</label>
                    <input type="number" name="amount" step="0.01" class="form-control" placeholder="0.00" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Category</label>
                    <input type="text" name="category" class="form-control" placeholder="e.g. Food, Travel, Office Supplies" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" placeholder="Enter details about the expense" required></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Date</label>
                    <input type="date" name="date" class="form-control" required>
                </div>

                <div class="card-footer" style="gap: var(--spacing-base);">
                    <a href="/dashboard" class="btn btn-secondary">← Back</a>
                    <button type="submit" class="btn btn-primary">Submit Expense</button>
                </div>

            </form>

        </div>

    </div>
</div>

</body>
</html>
