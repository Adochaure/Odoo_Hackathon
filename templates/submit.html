<!DOCTYPE html>
<html>
<head>
    <title>Submit Expense</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-3">💸 Submit Expense</h2>

        <!-- 🔥 TAGLINE -->
        <p class="text-center text-muted mb-4">
            Add your expense details for approval workflow
        </p>

        <form method="POST">

            <!-- 💰 AMOUNT -->
            <div class="mb-3">
                <label class="form-label">Amount</label>
                <input type="number" name="amount" class="form-control" placeholder="Enter amount" required>
            </div>

            <!-- 📂 CATEGORY -->
            <div class="mb-3">
                <label class="form-label">Category</label>
                <input type="text" name="category" class="form-control" placeholder="e.g. Food, Travel" required>
            </div>

            <!-- 📝 DESCRIPTION -->
            <div class="mb-3">
                <label class="form-label">Description</label>
                <input type="text" name="description" class="form-control" placeholder="Enter details" required>
            </div>

            <!-- 📅 DATE (NEW - VERY IMPORTANT) -->
            <div class="mb-3">
                <label class="form-label">Date</label>
                <input type="date" name="date" class="form-control" required>
            </div>

            <!-- 🚀 SUBMIT -->
            <button class="btn btn-success w-100">
                Submit Expense
            </button>

        </form>

        <hr>

        <a href="/dashboard" class="btn btn-secondary w-100">
            ⬅ Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
