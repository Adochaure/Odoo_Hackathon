<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">⚙️ Admin Panel</h2>

<form method="POST" class="mb-4">
<input name="name" class="form-control mb-2" placeholder="Name" required>
<input name="email" class="form-control mb-2" placeholder="Email" required>
<input name="password" class="form-control mb-2" placeholder="Password" required>

<select name="role" class="form-control mb-2">
<option value="employee">Employee</option>
<option value="manager">Manager</option>
<option value="finance">Finance</option>
<option value="director">Director</option>
<option value="admin">Admin</option>
</select>

<input name="manager_id" class="form-control mb-2" placeholder="Manager ID (optional)">

<button class="btn btn-success w-100">Create User</button>
</form>

<table class="table">
<tr><th>Name</th><th>Email</th><th>Role</th><th>Manager</th></tr>

{% for u in users %}
<tr>
<td>{{ u["name"] }}</td>
<td>{{ u["email"] }}</td>
<td>{{ u["role"] }}</td>
<td>{{ u["manager_id"] }}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
