<!DOCTYPE html>
<html>
<head>
    <title>Approval Panel</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">✅ Approval Panel</h2>

        <table class="table table-bordered table-hover text-center">

            <thead class="table-dark">
                <tr>
                    <th>Amount</th>
                    <th>Category</th>
                    <th>Description</th>
                    <th>Comment</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for exp in expenses %}
                <tr>
                    <td>₹ {{ exp["amount"] }}</td>
                    <td>{{ exp["category"] }}</td>
                    <td>{{ exp["description"] }}</td>

                    <!-- COMMENT INPUT -->
                    <td>
                        <form method="POST" action="/approve_expense/{{ exp['id'] }}">
                            <input type="text" name="comment" class="form-control mb-2" placeholder="Add comment">
                    </td>

                    <!-- ACTION BUTTONS -->
                    <td>
                            <button class="btn btn-success btn-sm">
                                ✅ Approve
                            </button>
                        </form>

                        <form method="POST" action="/reject_expense/{{ exp['id'] }}">
                            <button class="btn btn-danger btn-sm mt-2">
                                ❌ Reject
                            </button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

        <a href="/dashboard" class="btn btn-secondary w-100">
            ⬅ Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
