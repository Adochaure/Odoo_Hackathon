<!DOCTYPE html>
<html>
<head>
    <title>Approval Panel</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">✅ Approval Panel</h2>

        <table class="table table-bordered table-hover">

            <thead class="table-dark">
                <tr>
                    <th>Amount</th>
                    <th>Category</th>
                    <th>Description</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for exp in expenses %}
                <tr>
                    <td>₹ {{ exp["amount"] }}</td>
                    <td>{{ exp["category"] }}</td>
                    <td>{{ exp["description"] }}</td>
                    <td>
                        <a href="/approve_expense/{{ exp['id'] }}" class="btn btn-success btn-sm">
                            ✅ Approve
                        </a>

                        <a href="/reject_expense/{{ exp['id'] }}" class="btn btn-danger btn-sm">
                            ❌ Reject
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

        <a href="/dashboard" class="btn btn-secondary w-100">
            ⬅ Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
