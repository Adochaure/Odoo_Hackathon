<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approval Panel - Reimbursement System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .expense-row {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr auto;
            gap: var(--spacing-base);
            align-items: center;
            padding: var(--spacing-md);
            border-bottom: 1px solid var(--color-border);
            transition: background-color var(--transition-fast);
        }

        .expense-row:hover {
            background-color: var(--color-bg-secondary);
        }

        .expense-row:last-child {
            border-bottom: none;
        }

        .action-buttons {
            display: flex;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .expense-row {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                width: 100%;
            }

            .action-buttons .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body class="page-wrapper">

<div class="page-content">
    <div class="container">

        <!-- PAGE HEADER -->
        <div style="text-align: center; margin-bottom: var(--spacing-xl);">
            <h1 class="page-title">✅ Approval Panel</h1>
            <p class="page-subtitle">Review and approve pending expense requests</p>
        </div>

        <!-- EXPENSES CARD -->
        <div class="card">

            {% if expenses %}

                <div style="margin-bottom: var(--spacing-lg);">
                    
                    {% for exp in expenses %}

                    <div class="expense-row">

                        <div>
                            <div class="font-weight-semibold" style="color: var(--color-primary);">₹ {{ exp["amount"] }}</div>
                            <div class="text-sm text-muted">{{ exp["category"] }}</div>
                        </div>

                        <div>
                            <div class="text-sm">{{ exp["description"] }}</div>
                        </div>

                        <div>
                            <input type="text" class="form-control form-control-sm" id="comment-{{ exp['id'] }}" placeholder="Add comment...">
                        </div>

                        <div class="action-buttons">
                            <form method="POST" action="/approve_expense/{{ exp['id'] }}" style="display: contents;">
                                <input type="hidden" name="comment" id="comment-input-{{ exp['id'] }}">
                                <button type="submit" class="btn btn-success btn-sm" onclick="document.getElementById('comment-input-{{ exp['id'] }}').value = document.getElementById('comment-{{ exp['id'] }}').value;">
                                    ✓ Approve
                                </button>
                            </form>

                            <form method="POST" action="/reject_expense/{{ exp['id'] }}" style="display: contents;">
                                <input type="hidden" name="comment" id="reject-comment-input-{{ exp['id'] }}">
                                <button type="submit" class="btn btn-danger btn-sm" onclick="document.getElementById('reject-comment-input-{{ exp['id'] }}').value = document.getElementById('comment-{{ exp['id'] }}').value;">
                                    ✗ Reject
                                </button>
                            </form>
                        </div>

                    </div>

                    {% endfor %}

                </div>

            {% else %}

                <div style="text-align: center; padding: var(--spacing-xl);">
                    <div style="font-size: 3rem; margin-bottom: var(--spacing-base);">🎉</div>
                    <p class="text-muted">No pending expenses to review</p>
                </div>

            {% endif %}

            <div class="card-footer">
                <a href="/dashboard" class="btn btn-secondary">← Back to Dashboard</a>
            </div>

        </div>

    </div>
</div>

</body>
</html>
